<!--/*
    Renders the Core Components Navigation model as a gcds-top-nav for the header's
    "menu" slot. The first item (the navigation root/home page) is marked as the
    top-nav's home/brand link; the rest render as plain gcds-nav-link items.

    data-sly-list is kept on a wrapping <sly> rather than combined with data-sly-test/
    data-sly-attribute on the gcds-nav-link itself - see breadcrumb.html for why.
*/-->
<gcds-top-nav slot="menu" label="${'Main menu' @ i18n}" alignment="right"
    data-sly-use.navigation="com.adobe.cq.wcm.core.components.models.Navigation"
    data-sly-test="${navigation.items.size > 0}">
    <sly data-sly-list.navItem="${navigation.items}">
        <gcds-nav-link data-sly-test.isFirst="${navItemList.first}"
            data-sly-attribute.slot="${isFirst ? 'home' : false}"
            href="${navItem.link.url}">${navItem.title}</gcds-nav-link>
    </sly>
</gcds-top-nav>
